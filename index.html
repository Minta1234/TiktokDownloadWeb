<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok All-in-One Downloader - Videos & Images</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            padding: 8px 24px;
            border-radius: 60px;
            margin-bottom: 15px;
        }

        .logo span {
            font-size: 2rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
        }

        /* URL Input Section */
        .url-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .url-label {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            color: rgba(255,255,255,0.8);
        }

        .url-input-wrapper {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .url-input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #fe2c55;
            box-shadow: 0 0 0 2px rgba(254,44,85,0.2);
        }

        .url-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(254,44,85,0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-outline:hover {
            border-color: #fe2c55;
            background: rgba(254,44,85,0.1);
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }

        @media (max-width: 900px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        .card-header span {
            font-size: 1.8rem;
        }

        .card-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #fe2c55, #25f4ee);
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            margin-top: 8px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
        }

        /* Results */
        .results-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
        }

        .results-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .image-card {
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .image-card:hover {
            transform: translateY(-3px);
            border-color: #fe2c55;
        }

        .image-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .image-info {
            padding: 10px;
            font-size: 0.75rem;
            text-align: center;
            color: rgba(255,255,255,0.6);
        }

        /* Download History */
        .history-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .history-item .info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            overflow: hidden;
        }

        .history-item .badge {
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .badge.video { background: #fe2c55; }
        .badge.audio { background: #25f4ee; color: #000; }
        .badge.image { background: #2dde98; color: #000; }

        .history-item .filename {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 8px;
        }

        .delete-btn:hover {
            color: #dc3545;
        }

        /* Queue list */
        .queue-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .queue-item {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            border-left: 4px solid #2dde98;
            animation: slideIn 0.3s;
            z-index: 1000;
            font-size: 0.85rem;
        }

        .toast.error { border-left-color: #dc3545; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Spinner */
        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: #fe2c55;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Tabs */
        .mini-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .mini-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 30px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 0.85rem;
        }

        .mini-tab.active {
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Stats */
        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fe2c55, #25f4ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <span>🎵</span>
                <h1>TikTok Downloader</h1>
                <span>📸</span>
            </div>
            <p class="subtitle">Download Videos & Extract High-Quality Images from TikTok Posts</p>
        </div>

        <!-- Main URL Input -->
        <div class="url-section">
            <label class="url-label">🔗 Enter TikTok URL (Video or Photo Post)</label>
            <div class="url-input-wrapper">
                <input type="text" id="main-url" class="url-input" placeholder="https://www.tiktok.com/@username/video/1234567890 or /photo/...">
                <button class="btn btn-primary" onclick="analyzeAndDownload()">🚀 Analyze & Download</button>
            </div>
            <div class="btn-group" style="margin-top: 15px;">
                <button class="btn btn-secondary" onclick="downloadVideoOnly()">⬇️ Download Video Only</button>
                <button class="btn btn-secondary" onclick="downloadAudioOnly()">🎵 Download Audio Only</button>
                <button class="btn btn-outline" onclick="extractImagesOnly()">📸 Extract Images Only</button>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="cards-grid">
            <!-- Left: Download Controls -->
            <div class="card">
                <div class="card-header">
                    <span>⬇️</span>
                    <h3>Download Manager</h3>
                </div>
                
                <div class="mini-tabs">
                    <button class="mini-tab active" onclick="switchTab('video-tab')">🎬 Video</button>
                    <button class="mini-tab" onclick="switchTab('audio-tab')">🎵 Audio</button>
                    <button class="mini-tab" onclick="switchTab('queue-tab')">📋 Queue</button>
                </div>

                <!-- Video Tab -->
                <div id="video-tab" class="tab-content active">
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="downloadVideoOnly()">⬇️ Download Video</button>
                        <button class="btn btn-outline" onclick="downloadWithWatermark()">💧 With Watermark</button>
                    </div>
                    <div id="video-progress" class="progress-container">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <div class="progress-text"></div>
                    </div>
                </div>

                <!-- Audio Tab -->
                <div id="audio-tab" class="tab-content">
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="downloadAudioOnly()">🎵 Download MP3</button>
                        <button class="btn btn-outline" onclick="downloadHighQualityAudio()">⭐ High Quality (320kbps)</button>
                    </div>
                    <div id="audio-progress" class="progress-container">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <div class="progress-text"></div>
                    </div>
                </div>

                <!-- Queue Tab -->
                <div id="queue-tab" class="tab-content">
                    <div id="queue-list" class="queue-list">
                        <div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.4);">No items in queue</div>
                    </div>
                    <div class="btn-group" style="margin-top: 15px;">
                        <button class="btn btn-secondary" onclick="clearQueue()">🗑️ Clear Queue</button>
                        <button class="btn btn-secondary" onclick="processQueue()">▶️ Process Queue</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="video-count">0</div>
                        <div class="stat-label">Videos</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="audio-count">0</div>
                        <div class="stat-label">Audio</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="image-count">0</div>
                        <div class="stat-label">Images</div>
                    </div>
                </div>
            </div>

            <!-- Right: Image Extractor -->
            <div class="card">
                <div class="card-header">
                    <span>📸</span>
                    <h3>Image Extractor</h3>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="extractImagesOnly()">🔍 Extract Images from Current URL</button>
                    <button class="btn btn-secondary" onclick="downloadAllExtractedImages()">💾 Download All Extracted Images</button>
                </div>
                
                <div id="image-progress" class="progress-container">
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                    <div class="progress-text"></div>
                </div>
                
                <div id="image-results"></div>
            </div>
        </div>

        <!-- Download History -->
        <div class="results-area">
            <div class="results-title">
                <span>📜</span> Download History
                <button class="btn btn-outline" style="margin-left: auto; padding: 5px 12px; font-size: 0.75rem;" onclick="clearHistory()">Clear All</button>
            </div>
            <div id="history-list" class="history-list">
                <div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.4);">No downloads yet</div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let currentMetadata = null;
        let extractedImages = [];
        let downloadQueue = [];
        let downloadHistory = [];
        let isProcessing = false;

        // Load saved data
        function loadSavedData() {
            try {
                const saved = localStorage.getItem('tiktok_downloader_history');
                if (saved) downloadHistory = JSON.parse(saved);
                updateHistoryDisplay();
                updateStats();
            } catch(e) {}
        }

        // Save history
        function saveHistory() {
            try {
                localStorage.setItem('tiktok_downloader_history', JSON.stringify(downloadHistory.slice(0, 100)));
            } catch(e) {}
        }

        // Show toast notification
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast${isError ? ' error' : ''}`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Update progress bar
        function updateProgress(containerId, percent, text) {
            const container = document.getElementById(containerId);
            if (container) {
                container.style.display = 'block';
                const fill = container.querySelector('.progress-fill');
                const textEl = container.querySelector('.progress-text');
                if (fill) fill.style.width = percent + '%';
                if (textEl) textEl.textContent = text;
            }
        }

        function hideProgress(containerId) {
            const container = document.getElementById(containerId);
            if (container) container.style.display = 'none';
        }

        // Update stats
        function updateStats() {
            const videoCount = downloadHistory.filter(h => h.type === 'video').length;
            const audioCount = downloadHistory.filter(h => h.type === 'audio').length;
            const imageCount = downloadHistory.filter(h => h.type === 'image').length;
            document.getElementById('video-count').textContent = videoCount;
            document.getElementById('audio-count').textContent = audioCount;
            document.getElementById('image-count').textContent = imageCount;
        }

        // Update history display
        function updateHistoryDisplay() {
            const container = document.getElementById('history-list');
            if (!container) return;
            
            if (downloadHistory.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.4);">No downloads yet</div>';
                return;
            }
            
            container.innerHTML = downloadHistory.slice(0, 30).map((item, idx) => `
                <div class="history-item">
                    <div class="info">
                        <span class="badge ${item.type}">${item.type === 'video' ? '🎬' : item.type === 'audio' ? '🎵' : '📸'} ${item.type.toUpperCase()}</span>
                        <span class="filename">${item.filename || item.url?.substring(0, 50) || 'Unknown'}</span>
                    </div>
                    <button class="delete-btn" onclick="removeHistoryItem(${idx})">✕</button>
                </div>
            `).join('');
        }

        function removeHistoryItem(index) {
            downloadHistory.splice(index, 1);
            saveHistory();
            updateHistoryDisplay();
            updateStats();
        }

        function clearHistory() {
            downloadHistory = [];
            saveHistory();
            updateHistoryDisplay();
            updateStats();
            showToast('History cleared');
        }

        // Add to history
        function addToHistory(url, filename, type) {
            downloadHistory.unshift({
                url: url,
                filename: filename,
                type: type,
                timestamp: new Date().toISOString()
            });
            saveHistory();
            updateHistoryDisplay();
            updateStats();
        }

        // Add to queue
        function addToQueue(url, type) {
            if (!downloadQueue.some(item => item.url === url)) {
                downloadQueue.push({ url, type, timestamp: Date.now() });
                updateQueueDisplay();
                showToast(`Added to queue: ${type.toUpperCase()}`);
            }
        }

        function updateQueueDisplay() {
            const container = document.getElementById('queue-list');
            if (!container) return;
            
            if (downloadQueue.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.4);">No items in queue</div>';
                return;
            }
            
            container.innerHTML = downloadQueue.map((item, idx) => `
                <div class="queue-item">
                    <span>${item.type === 'video' ? '🎬' : item.type === 'audio' ? '🎵' : '📸'} ${item.url.substring(0, 50)}...</span>
                    <button class="delete-btn" onclick="removeFromQueue(${idx})">✕</button>
                </div>
            `).join('');
        }

        function removeFromQueue(index) {
            downloadQueue.splice(index, 1);
            updateQueueDisplay();
        }

        function clearQueue() {
            downloadQueue = [];
            updateQueueDisplay();
            showToast('Queue cleared');
        }

        async function processQueue() {
            if (isProcessing) {
                showToast('Already processing...', true);
                return;
            }
            
            if (downloadQueue.length === 0) {
                showToast('Queue is empty', true);
                return;
            }
            
            isProcessing = true;
            const queueCopy = [...downloadQueue];
            downloadQueue = [];
            updateQueueDisplay();
            
            for (let i = 0; i < queueCopy.length; i++) {
                const item = queueCopy[i];
                showToast(`Processing ${i+1}/${queueCopy.length}: ${item.type}`);
                
                if (item.type === 'video') {
                    await downloadVideoFromUrl(item.url);
                } else if (item.type === 'audio') {
                    await downloadAudioFromUrl(item.url);
                } else if (item.type === 'image') {
                    await extractImagesFromUrl(item.url);
                }
                
                await new Promise(r => setTimeout(r, 1000));
            }
            
            isProcessing = false;
            showToast('Queue processing complete!');
        }

        // Fetch TikTok data
        async function fetchTikTokData(url) {
            try {
                const apiUrl = `https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.code === 0 && data.data) {
                    currentMetadata = data.data;
                    return data.data;
                }
                throw new Error('Invalid response');
            } catch (error) {
                console.error(error);
                showToast('Failed to fetch TikTok data. Check URL and try again.', true);
                return null;
            }
        }

        // Get current URL from input
        function getCurrentUrl() {
            const url = document.getElementById('main-url').value.trim();
            if (!url) {
                showToast('Please enter a TikTok URL', true);
                return null;
            }
            return url;
        }

        // Download video from URL
        async function downloadVideoFromUrl(url, withWatermark = false) {
            updateProgress('video-progress', 0, 'Fetching video...');
            
            const data = await fetchTikTokData(url);
            if (!data) {
                hideProgress('video-progress');
                return false;
            }
            
            const videoUrl = withWatermark ? data.wmplay || data.play : data.play;
            const title = data.title || 'tiktok_video';
            
            updateProgress('video-progress', 50, 'Downloading...');
            
            try {
                const response = await fetch(videoUrl);
                const blob = await response.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                const filename = `${title.substring(0, 50)}${withWatermark ? '_wm' : ''}.mp4`;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                
                updateProgress('video-progress', 100, 'Complete!');
                setTimeout(() => hideProgress('video-progress'), 2000);
                addToHistory(url, filename, 'video');
                showToast('Video downloaded successfully!');
                return true;
            } catch (error) {
                showToast('Download failed', true);
                hideProgress('video-progress');
                return false;
            }
        }

        async function downloadVideoOnly() {
            const url = getCurrentUrl();
            if (!url) return;
            addToQueue(url, 'video');
            await processQueue();
        }

        async function downloadWithWatermark() {
            const url = getCurrentUrl();
            if (!url) return;
            await downloadVideoFromUrl(url, true);
        }

        async function downloadAudioFromUrl(url) {
            updateProgress('audio-progress', 0, 'Fetching audio...');
            
            const data = await fetchTikTokData(url);
            if (!data) {
                hideProgress('audio-progress');
                return false;
            }
            
            const audioUrl = data.music;
            const title = data.title || 'tiktok_audio';
            
            updateProgress('audio-progress', 50, 'Downloading audio...');
            
            try {
                const response = await fetch(audioUrl);
                const blob = await response.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                const filename = `${title.substring(0, 50)}.mp3`;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                
                updateProgress('audio-progress', 100, 'Complete!');
                setTimeout(() => hideProgress('audio-progress'), 2000);
                addToHistory(url, filename, 'audio');
                showToast('Audio downloaded successfully!');
                return true;
            } catch (error) {
                showToast('Audio download failed', true);
                hideProgress('audio-progress');
                return false;
            }
        }

        async function downloadAudioOnly() {
            const url = getCurrentUrl();
            if (!url) return;
            addToQueue(url, 'audio');
            await processQueue();
        }

        async function downloadHighQualityAudio() {
            const url = getCurrentUrl();
            if (!url) return;
            await downloadAudioFromUrl(url);
        }

        async function extractImagesFromUrl(url) {
            updateProgress('image-progress', 0, 'Extracting images...');
            document.getElementById('image-results').innerHTML = '<div class="spinner"></div>';
            
            const data = await fetchTikTokData(url);
            if (!data) {
                hideProgress('image-progress');
                document.getElementById('image-results').innerHTML = '';
                return false;
            }
            
            const images = data.images || [];
            const title = data.title || 'tiktok_photos';
            const author = data.author?.nickname || 'Unknown';
            
            if (images.length === 0) {
                document.getElementById('image-results').innerHTML = '<div style="text-align: center; padding: 20px; color: rgba(255,255,255,0.5);">No images found in this post. Try a photo post URL.</div>';
                hideProgress('image-progress');
                showToast('No images found', true);
                return false;
            }
            
            extractedImages = images;
            
            const resultHtml = `
                <div style="margin-top: 15px;">
                    <p style="margin-bottom: 10px; font-size: 0.85rem;">
                        📸 <strong>${images.length}</strong> images found | 👤 ${author}
                    </p>
                    <div class="image-grid" id="extracted-image-grid"></div>
                    <div class="btn-group" style="margin-top: 15px;">
                        <button class="btn btn-primary" onclick="downloadAllExtractedImages()">💾 Download All (${images.length})</button>
                    </div>
                </div>
            `;
            document.getElementById('image-results').innerHTML = resultHtml;
            
            const grid = document.getElementById('extracted-image-grid');
            for (let i = 0; i < images.length; i++) {
                const imgUrl = images[i];
                const card = document.createElement('div');
                card.className = 'image-card';
                card.onclick = () => downloadSingleImage(imgUrl, i + 1);
                card.innerHTML = `
                    <img src="${imgUrl}" alt="Image ${i + 1}" onerror="this.src='https://via.placeholder.com/300?text=Error'">
                    <div class="image-info">Image ${i + 1} • Click to download</div>
                `;
                grid.appendChild(card);
            }
            
            updateProgress('image-progress', 100, 'Ready!');
            setTimeout(() => hideProgress('image-progress'), 1500);
            showToast(`Found ${images.length} high-quality images!`);
            return true;
        }

        async function extractImagesOnly() {
            const url = getCurrentUrl();
            if (!url) return;
            addToQueue(url, 'image');
            await processQueue();
        }

        async function downloadSingleImage(url, index) {
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const downloadUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                const filename = `tiktok_image_${index}.jpg`;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(downloadUrl);
                addToHistory(url, filename, 'image');
                showToast(`Image ${index} downloaded!`);
            } catch (error) {
                showToast('Failed to download image', true);
            }
        }

        async function downloadAllExtractedImages() {
            if (!extractedImages.length) {
                showToast('No images to download', true);
                return;
            }
            
            showToast(`Downloading ${extractedImages.length} images...`);
            for (let i = 0; i < extractedImages.length; i++) {
                await new Promise(r => setTimeout(r, 300));
                await downloadSingleImage(extractedImages[i], i + 1);
            }
        }

        async function analyzeAndDownload() {
            const url = getCurrentUrl();
            if (!url) return;
            
            updateProgress('video-progress', 0, 'Analyzing URL...');
            const data = await fetchTikTokData(url);
            
            if (data) {
                if (data.images && data.images.length > 0) {
                    hideProgress('video-progress');
                    await extractImagesFromUrl(url);
                } else if (data.play) {
                    await downloadVideoFromUrl(url);
                } else {
                    hideProgress('video-progress');
                    showToast('Could not detect content type', true);
                }
            } else {
                hideProgress('video-progress');
            }
        }

        // Tab switching
        function switchTab(tabId) {
            document.querySelectorAll('.mini-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // Load saved data on startup
        loadSavedData();
    </script>
</body>
</html>
